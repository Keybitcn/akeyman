<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Key 博客后台</title>
    <link rel="cms-config-url" type="text/yaml" href="config.yml" />
    <link rel="stylesheet" href="cms.css" />
    <style>
      #boot-hint {
        display: none;
        max-width: 480px;
        margin: 48px auto;
        padding: 24px;
        border: 1px solid #333;
        border-radius: 8px;
        background: #111;
        color: #a3a3a3;
        font: 14px/1.6 system-ui, sans-serif;
      }
      #boot-hint h1 {
        margin: 0 0 12px;
        color: #f0f0f0;
        font-size: 18px;
      }
      #boot-hint a { color: #60a5fa; }
    </style>
  </head>
  <body>
    <div id="boot-hint">
      <h1>后台加载失败？</h1>
      <p>若长时间白屏，请确认已完成 OAuth 配置（见下方说明），并尝试刷新页面。</p>
      <p><a href="setup.html">查看配置说明</a></p>
    </div>
    <script>
      setTimeout(function () {
        if (!window.CMS) {
          document.getElementById("boot-hint").style.display = "block";
        }
      }, 8000);
    </script>
    <script src="https://cdn.jsdelivr.net/npm/decap-cms@3.4.0/dist/decap-cms.js"></script>
  </body>
</html>
